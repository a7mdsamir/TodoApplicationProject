name: Run Selenium Tests
on:
  push:
    branches: [ main ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          cache: maven
          distribution: 'temurin'
      - uses: browser-actions/setup-chrome@latest
      - run: mvn clean test